# KnowMat conda 环境：整合所有依赖（含 OCR、LLM、开发）
# 创建: conda env create -f environment.yml
# 更新: conda env update -f environment.yml --prune
name: KnowMat
channels:
  - defaults
  - conda-forge
  - pytorch
dependencies:
  - python==3.11
  - pip

  # 基础科学计算与数据
  - numpy==2.2.6
  - scipy==1.16.0
  - pandas==2.3.2
  - tqdm==4.67.1
  - click
  - ipython

  # 可视化
  - matplotlib
  - ipympl
  - seaborn

  # 开发与文档
  - jupyterlab
  - pytest
  - pytest-cov
  - tox
  - pre-commit
  - nbdime
  - nbstripout
  - sphinx
  - recommonmark

  - pip:
      - -e .

      # LangChain & 编排
      - langchain==0.3.26
      - langchain-community==0.3.27
      - langchain-openai==0.3.27
      - langgraph==0.6.10
      - trustcall==0.0.39

      # OpenAI / API
      - openai==1.93.2

      # PaddleOCR-VL（PDF 解析）：此处为 CPU 版，跨平台通用。需 GPU 时由脚本或 requirements-gpu.txt 单独安装。
      - paddlepaddle>=3.0.0
      - paddleocr[all]
      - pymupdf==1.24.13

      # OCR 相关传递依赖（与 knowmat 可运行环境一致）
      - beautifulsoup4>=4.12
      - lxml>=6.0
      - cssselect>=1.4
      - einops>=0.8
      - openpyxl>=3.1
      - premailer>=3.10

      # 校验与配置
      - pydantic==2.11.7
      - pydantic-settings>=2.0.0
      - python-dotenv==1.1.1
      - colorlog==6.9.0
      - PyYAML>=6.0

      # 向量与嵌入
      - sentence-transformers==5.0.0
      - torch==2.8.0
      - torchvision==0.23.0

# GPU 与 KnowMat 已分开：本 yml 仅含 CPU 版 Paddle，Mac/Linux/Windows 均可直接 conda env create。
# 需要 GPU（Windows/Linux + NVIDIA）时，二选一：
#   1) 一键脚本（推荐）：Windows 运行 .\scripts\setup_env.ps1；Linux/Mac 运行 ./scripts/setup_env.sh（Mac 自动用 CPU）
#   2) 手动：pip install -r requirements-gpu.txt -i https://www.paddlepaddle.org.cn/packages/stable/cu129/
#      然后 conda install nvidia::cudnn cuda-version=12。详见 docs/ocr-cudnn64_9-fix.md、docs/platforms.md
