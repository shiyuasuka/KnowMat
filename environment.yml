# KnowMat conda 环境：整合所有依赖（含 OCR、LLM、开发）
# 创建: conda env create -f environment.yml
# 更新: conda env update -f environment.yml --prune
name: KnowMat
channels:
  - defaults
  - conda-forge
  - pytorch
dependencies:
  - python==3.11
  - pip

  # 基础科学计算与数据
  - numpy==2.2.6
  - scipy==1.16.0
  - pandas==2.3.2
  - tqdm==4.67.1
  - click
  - ipython

  # 可视化
  - matplotlib
  - ipympl
  - seaborn

  # 开发与文档
  - jupyterlab
  - pytest
  - pytest-cov
  - tox
  - pre-commit
  - nbdime
  - nbstripout
  - sphinx
  - recommonmark

  - pip:
      - -e .

      # LangChain & 编排
      - langchain==0.3.26
      - langchain-community==0.3.27
      - langchain-openai==0.3.27
      - langgraph==0.6.10
      - trustcall==0.0.39

      # OpenAI / API
      - openai==1.93.2

      # PaddleOCR-VL（PDF 解析，默认 GPU cu129；需 cuDNN 9，否则报 cudnn64_9.dll）
      # 推荐单独安装以指定国内源：python -m pip install paddlepaddle-gpu==3.3.0 -i https://www.paddlepaddle.org.cn/packages/stable/cu129/
      # 然后：python -m pip install "paddleocr[all]"
      # cuDNN 9（GPU OCR 必需）：conda install nvidia::cudnn cuda-version=12。详见 docs/ocr-cudnn64_9-fix.md
      - paddlepaddle-gpu==3.3.0
      - paddleocr[all]
      - pymupdf==1.24.13

      # OCR 相关传递依赖（与 knowmat 可运行环境一致）
      - beautifulsoup4>=4.12
      - lxml>=6.0
      - cssselect>=1.4
      - einops>=0.8
      - openpyxl>=3.1
      - premailer>=3.10

      # 校验与配置
      - pydantic==2.11.7
      - pydantic-settings>=2.0.0
      - python-dotenv==1.1.1
      - colorlog==6.9.0
      - PyYAML>=6.0

      # 向量与嵌入
      - sentence-transformers==5.0.0
      - torch==2.8.0
      - torchvision==0.23.0

# 默认 GPU（CUDA 12.9）。若 conda 创建时 paddlepaddle-gpu 安装失败，请激活环境后执行：
#   python -m pip install paddlepaddle-gpu==3.3.0 -i https://www.paddlepaddle.org.cn/packages/stable/cu129/
#   python -m pip install "paddleocr[all]"
# cuDNN 9（GPU OCR 必需，否则报 cudnn64_9.dll error 126）：
#   conda install nvidia::cudnn cuda-version=12
# 使用 CPU OCR：设置环境变量 KNOWMAT_OCR_DEVICE=cpu。详见 docs/ocr-cudnn64_9-fix.md
