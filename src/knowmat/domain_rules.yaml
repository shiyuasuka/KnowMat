# Regex patterns for extracting key process parameters from free text.
# Each entry maps a parameter name to a list of regex patterns (tried in order).
# The first capturing group of the first matching pattern is used as the value.
parameter_patterns:
  Laser_Power_W:
    - "(?:laser\\s+power|power)\\s*[=:]\\s*(\\d+(?:\\.\\d+)?)\\s*W"
    - "P\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*W"
  Scan_Speed_mm_s:
    - "(?:scan(?:ning)?\\s+speed|scanning\\s+velocity)\\s*[=:]\\s*(\\d+(?:\\.\\d+)?)\\s*mm/s"
    - "v\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*mm/s"
  Layer_Thickness_um:
    - "layer\\s+thickness\\s*[=:]\\s*(\\d+(?:\\.\\d+)?)\\s*(?:μm|um|µm)"
    - "t\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*(?:μm|um|µm)"
  Hatch_Spacing_um:
    - "hatch(?:ing)?\\s+spac(?:e|ing)\\s*[=:]\\s*(\\d+(?:\\.\\d+)?)\\s*(?:μm|um|µm)"
    - "line\\s+spacing\\s*[=:]\\s*(\\d+(?:\\.\\d+)?)\\s*(?:μm|um|µm)"
    - "h\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*(?:μm|um|µm)"
  Preheat_Temperature_C:
    - "(?:preheat|preheating|substrate)\\s+(?:temperature|temp)\\s*[=:]\\s*(\\d+(?:\\.\\d+)?)\\s*°?\\s*C"
  Oxygen_Content_ppm:
    - "oxygen\\s+(?:content\\s+)?(?:below|<|under)?\\s*(\\d+)\\s*ppm"

# Configurable commercial alloy aliases and nominal composition maps.
# These are used as a conservative fallback only when explicit nominal/measured
# compositions are missing in extracted data.
commercial_alloy_aliases:
  ti6al4v:
    - ti6al4v
    - ti-6al-4v
    - ti64
  in718:
    - in718
    - inconel 718
    - inconel718

commercial_nominal_maps:
  ti6al4v:
    Ti: 90.0
    Al: 6.0
    V: 4.0
  in718:
    Ni: 52.99
    Cr: 19.04
    Fe: 18.20
    Nb: 4.90
    Mo: 2.73
    Ti: 0.97
    Al: 0.48
    other: 0.69
